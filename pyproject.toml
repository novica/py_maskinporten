[project]
name = "py_maskinporten"
version = "0.10.1"
description = "Fetch Maskinporten Token"
readme = "README.md"
authors = [
    { name = "Novica Nakov", email = "nnovica@gmail.com" }
]
license = "Apache-2.0"

requires-python = ">=3.13"
dependencies = [
    "httpx",
    "jwcrypto",
    "pyjwt",
    "flask>=3.1.3",
    "python-dotenv>=1.2.2",
]

[project.scripts]
py_maskinporten = "py_maskinporten:main" 
maskinporten-web = "py_maskinporten.web.app:main"

[build-system]
requires = ["uv_build>=0.9.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "ruff>=0.6.1",
    "ty>=0.0.19",
    "pytest>=8.3.3",
]
